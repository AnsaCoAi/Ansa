  <!-- Logo -->
  <text x="600" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Inter', sans-serif" font-size="120" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-4">ansa<tspan fill="#3b82f6">.</tspan></text>
